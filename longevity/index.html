<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Longevity">
  <meta name="description" content="Personal longevity protocol tracker — fasting timer, daily pillars, and streaks. Works offline.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <title>Longevity Stack</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-elev: #1e293b;
      --bg-elev-2: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --faint: #64748b;
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --green: #34d399;
      --amber: #fbbf24;
      --ring-track: #334155;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      padding: max(20px, env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
      max-width: 480px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }

    header { text-align: center; margin: 8px 0 22px; }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header .date {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 4px;
    }

    .card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Fasting timer ── */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 8px;
    }
    .ring {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 6px 0 14px;
    }
    .ring svg { transform: rotate(-90deg); }
    .ring .track { stroke: var(--ring-track); }
    .ring .progress {
      stroke: var(--accent);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease, stroke 0.4s ease;
    }
    .ring.complete .progress { stroke: var(--green); }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .ring-center .elapsed {
      font-family: var(--mono);
      font-size: 34px;
      font-weight: 600;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }
    .ring-center .goal-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .ring-center .pct {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 6px;
    }
    .ring.complete + * .done-badge,
    .ring.complete .done-badge { color: var(--green); }

    .timer-status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      text-align: center;
      margin-bottom: 14px;
    }
    .timer-status b { color: var(--green); font-weight: 600; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.15s ease, opacity 0.15s;
      color: #04223a;
      background: var(--accent);
    }
    .btn:active { transform: scale(0.98); }
    .btn.stop {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn.stop:active { background: var(--bg-elev-2); }

    .goal-edit {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--faint);
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }
    .goal-edit button {
      background: var(--bg-elev-2);
      border: none;
      color: var(--text);
      width: 22px;
      height: 22px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
    }
    .goal-edit button:active { background: var(--accent); color: #04223a; }
    .goal-edit span { min-width: 16px; text-align: center; }

    /* ── Pillars ── */
    .pillars { margin-top: 14px; display: flex; flex-direction: column; gap: 4px; }
    .pillar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 12px;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .pillar:active { background: var(--bg-elev-2); }
    .pillar .box {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid var(--faint);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .pillar .box svg { opacity: 0; transform: scale(0.5); transition: all 0.15s; }
    .pillar.done .box {
      background: var(--green);
      border-color: var(--green);
    }
    .pillar.done .box svg { opacity: 1; transform: scale(1); }
    .pillar .label { font-size: 15px; flex: 1; transition: color 0.15s; }
    .pillar .emoji { font-size: 18px; width: 22px; text-align: center; }
    .pillar.done .label { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--faint); }

    .progress-bar {
      height: 6px;
      background: var(--ring-track);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 16px;
    }
    .progress-bar i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .pillar-count {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }

    /* ── Streak ── */
    .streak-row { display: flex; gap: 14px; margin-top: 6px; }
    .stat {
      flex: 1;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }
    .stat .num {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat .num .fire { font-size: 22px; }
    .stat .lbl {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 8px;
    }

    footer {
      text-align: center;
      font-size: 11px;
      color: var(--faint);
      margin-top: 20px;
      line-height: 1.7;
    }
    footer .install {
      display: none;
      margin: 0 auto 14px;
      width: auto;
      padding: 10px 20px;
      font-size: 13px;
      background: var(--bg-elev);
      color: var(--accent);
      border: 1px solid var(--border);
    }
    footer .install.show { display: inline-block; }
    .offline-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 5px;
      vertical-align: middle;
    }
    .offline-dot.off { background: var(--amber); }
  </style>
</head>
<body>

  <header>
    <h1>Daily Protocol</h1>
    <div class="date" id="todayDate">—</div>
  </header>

  <!-- Fasting Timer -->
  <div class="card">
    <h2>
      <span>Fasting Window</span>
      <span class="goal-edit">
        Goal
        <button id="goalDown" aria-label="Decrease goal">−</button>
        <span id="goalHrs">14</span>h
        <button id="goalUp" aria-label="Increase goal">+</button>
      </span>
    </h2>

    <div class="timer-wrap">
      <div class="ring" id="ring">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle class="track" cx="100" cy="100" r="88" fill="none" stroke-width="14"></circle>
          <circle class="progress" id="ringProgress" cx="100" cy="100" r="88" fill="none" stroke-width="14"
                  stroke-dasharray="552.92" stroke-dashoffset="552.92"></circle>
        </svg>
        <div class="ring-center">
          <div class="elapsed" id="timer">00:00:00</div>
          <div class="goal-label" id="goalLabel">of 14h goal</div>
          <div class="pct" id="pct"></div>
        </div>
      </div>

      <div class="timer-status" id="timerStatus">Not fasting</div>

      <button class="btn" id="fastBtn">Start Fast</button>
    </div>
  </div>

  <!-- Daily Pillars -->
  <div class="card">
    <h2><span>Daily Pillars</span></h2>
    <div class="pillars" id="pillars"></div>
    <div class="progress-bar"><i id="pillarFill"></i></div>
    <div class="pillar-count" id="pillarCount">0 of 4 complete</div>
  </div>

  <!-- Streaks -->
  <div class="streak-row">
    <div class="stat">
      <div class="num"><span id="dayStreak">0</span><span class="fire"> 🔥</span></div>
      <div class="lbl">Day Streak</div>
    </div>
    <div class="stat">
      <div class="num"><span id="bestFast">0</span><span style="font-size:18px">h</span></div>
      <div class="lbl">Best Fast</div>
    </div>
  </div>

  <footer>
    <button class="btn install" id="installBtn">⊕ Install App</button>
    <div><span class="offline-dot" id="netDot"></span><span id="netLabel">Ready · works offline</span></div>
    <div>Tap a pillar to log it · resets daily at midnight</div>
  </footer>

  <script>
    "use strict";

    // ── Config ──────────────────────────────────────────────
    const PILLARS = [
      { id: "breath",  emoji: "🫁", label: "Kumbhaka Breathwork" },
      { id: "ellagi",  emoji: "🍇", label: "Ellagitannin Intake" },
      { id: "thermal", emoji: "🧊", label: "Cold / Hot Therapy" },
      { id: "motion",  emoji: "🐕", label: "Motion (Walk with Earl)" },
    ];
    const RING_CIRC = 2 * Math.PI * 88; // 552.92

    // ── Storage helpers ─────────────────────────────────────
    const KEY = "longevityStack.v1";
    function load() {
      try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
      catch { return {}; }
    }
    function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

    let state = Object.assign({
      fastStart: null,        // ms timestamp or null
      goalHours: 14,
      pillarsByDay: {},       // { "2026-06-27": { breath:true, ... } }
      lastPillarDay: null,
      pillarStreak: 0,        // consecutive fully-complete days
      bestFastHours: 0,
    }, load());

    // ── Date utilities ──────────────────────────────────────
    const dayKey = (d = new Date()) =>
      `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

    function prevDayKey(key) {
      const [y, m, d] = key.split("-").map(Number);
      const dt = new Date(y, m - 1, d - 1);
      return dayKey(dt);
    }

    // ── Today's pillar record (with daily reset) ────────────
    function todaysPillars() {
      const today = dayKey();
      if (!state.pillarsByDay[today]) {
        // New day: settle yesterday's streak before resetting the view
        settleStreak();
        state.pillarsByDay[today] = {};
        // keep storage lean: only retain last 14 days
        const keep = {};
        let k = today;
        for (let i = 0; i < 14; i++) { if (state.pillarsByDay[k]) keep[k] = state.pillarsByDay[k]; k = prevDayKey(k); }
        state.pillarsByDay = keep;
        save(state);
      }
      return state.pillarsByDay[today];
    }

    function isComplete(rec) { return PILLARS.every(p => rec && rec[p.id]); }

    // Recompute the consecutive-complete-day streak ending today/yesterday
    function settleStreak() {
      let streak = 0;
      let k = dayKey();
      // if today not complete yet, the streak is anchored at yesterday
      if (!isComplete(state.pillarsByDay[k])) k = prevDayKey(k);
      while (isComplete(state.pillarsByDay[k])) { streak++; k = prevDayKey(k); }
      state.pillarStreak = streak;
    }

    // ── Render: pillars ─────────────────────────────────────
    const pillarsEl = document.getElementById("pillars");
    const checkSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#04223a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    function renderPillars() {
      const rec = todaysPillars();
      pillarsEl.innerHTML = PILLARS.map(p => `
        <div class="pillar ${rec[p.id] ? "done" : ""}" data-id="${p.id}">
          <div class="box">${checkSVG}</div>
          <span class="emoji">${p.emoji}</span>
          <span class="label">${p.label}</span>
        </div>`).join("");

      const done = PILLARS.filter(p => rec[p.id]).length;
      document.getElementById("pillarFill").style.width = (done / PILLARS.length * 100) + "%";
      document.getElementById("pillarCount").textContent =
        done === PILLARS.length ? "✓ All pillars complete — nice work" : `${done} of ${PILLARS.length} complete`;

      settleStreak();
      document.getElementById("dayStreak").textContent = state.pillarStreak;
    }

    pillarsEl.addEventListener("click", (e) => {
      const row = e.target.closest(".pillar");
      if (!row) return;
      const rec = todaysPillars();
      const id = row.dataset.id;
      rec[id] = !rec[id];
      save(state);
      renderPillars();
    });

    // ── Render: fasting timer ───────────────────────────────
    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("timerStatus");
    const fastBtn = document.getElementById("fastBtn");
    const ringEl = document.getElementById("ring");
    const ringProgress = document.getElementById("ringProgress");
    const pctEl = document.getElementById("pct");
    const goalLabel = document.getElementById("goalLabel");

    function fmt(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return [h, m, sec].map(n => String(n).padStart(2, "0")).join(":");
    }

    function renderTimer() {
      const goalMs = state.goalHours * 3600000;
      goalLabel.textContent = `of ${state.goalHours}h goal`;

      if (!state.fastStart) {
        timerEl.textContent = "00:00:00";
        statusEl.textContent = "Not fasting";
        fastBtn.textContent = "Start Fast";
        fastBtn.classList.remove("stop");
        ringProgress.style.strokeDashoffset = RING_CIRC;
        ringEl.classList.remove("complete");
        pctEl.textContent = "";
        return;
      }

      const elapsed = Date.now() - state.fastStart;
      timerEl.textContent = fmt(elapsed);
      const frac = Math.min(1, elapsed / goalMs);
      ringProgress.style.strokeDashoffset = RING_CIRC * (1 - frac);
      pctEl.textContent = Math.floor(frac * 100) + "%";
      fastBtn.textContent = "End Fast";
      fastBtn.classList.add("stop");

      if (elapsed >= goalMs) {
        ringEl.classList.add("complete");
        const extra = fmt(elapsed - goalMs);
        statusEl.innerHTML = `<b>Goal reached!</b> +${extra} past ${state.goalHours}h`;
      } else {
        ringEl.classList.remove("complete");
        const remain = fmt(goalMs - elapsed);
        statusEl.textContent = `${remain} until ${state.goalHours}h goal`;
      }
    }

    fastBtn.addEventListener("click", () => {
      if (!state.fastStart) {
        state.fastStart = Date.now();
      } else {
        const hrs = (Date.now() - state.fastStart) / 3600000;
        if (hrs > state.bestFastHours) {
          state.bestFastHours = Math.floor(hrs);
          document.getElementById("bestFast").textContent = state.bestFastHours;
        }
        state.fastStart = null;
      }
      save(state);
      renderTimer();
    });

    // ── Goal adjust ─────────────────────────────────────────
    const goalHrsEl = document.getElementById("goalHrs");
    function setGoal(delta) {
      state.goalHours = Math.min(36, Math.max(8, state.goalHours + delta));
      goalHrsEl.textContent = state.goalHours;
      save(state);
      renderTimer();
    }
    document.getElementById("goalUp").addEventListener("click", () => setGoal(1));
    document.getElementById("goalDown").addEventListener("click", () => setGoal(-1));

    // ── Header date ─────────────────────────────────────────
    function renderDate() {
      document.getElementById("todayDate").textContent =
        new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
    }

    // ── Tick loop ───────────────────────────────────────────
    let lastDay = dayKey();
    function tick() {
      if (state.fastStart) renderTimer();
      // Detect rollover to a new day while app is open
      const now = dayKey();
      if (now !== lastDay) { lastDay = now; renderDate(); renderPillars(); }
    }
    setInterval(tick, 1000);

    // Re-sync when returning to a backgrounded tab/app
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        if (dayKey() !== lastDay) { lastDay = dayKey(); renderDate(); renderPillars(); }
        renderTimer();
      }
    });

    // ── Network status ──────────────────────────────────────
    const netDot = document.getElementById("netDot");
    const netLabel = document.getElementById("netLabel");
    function renderNet() {
      const off = !navigator.onLine;
      netDot.classList.toggle("off", off);
      netLabel.textContent = off ? "Offline · still tracking" : "Ready · works offline";
    }
    window.addEventListener("online", renderNet);
    window.addEventListener("offline", renderNet);

    // ── Initial paint ───────────────────────────────────────
    goalHrsEl.textContent = state.goalHours;
    document.getElementById("bestFast").textContent = state.bestFastHours;
    renderDate();
    renderPillars();
    renderTimer();
    renderNet();

    // ── PWA: install prompt + service worker ────────────────
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add("show");
    });
    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.remove("show");
    });
    window.addEventListener("appinstalled", () => installBtn.classList.remove("show"));

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
